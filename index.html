<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuTools · free tools for your neurodivergent brain</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;min-height:100%;}
body{-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}
/* gentle, predictable easing keeps motion calm for sensitive brains */
@keyframes breathe{0%,100%{transform:scale(.82);opacity:.5;}50%{transform:scale(1.12);opacity:1;}}
@keyframes halo{0%,100%{transform:scale(1);opacity:.42;}50%{transform:scale(1.13);opacity:.72;}}
@keyframes pop{0%{transform:scale(.96);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes fillIn{from{transform:scaleX(0);}to{transform:scaleX(1);}}
@keyframes slideIn{from{transform:translateX(-100%);}to{transform:translateX(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes viewIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes expandIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
@keyframes wave{0%,62%,100%{transform:rotate(0deg);}12%,32%{transform:rotate(15deg);}22%{transform:rotate(-9deg);}42%{transform:rotate(-4deg);}52%{transform:rotate(11deg);}}
@keyframes riseIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.drawer-open{animation:slideIn 300ms cubic-bezier(.22,.61,.36,1) forwards;}
.fade-in{animation:fadeIn 220ms ease forwards;}
.slide-up{animation:slideUp 460ms cubic-bezier(.22,.61,.36,1) both;}
.view-enter{animation:viewIn 380ms cubic-bezier(.22,.61,.36,1) both;}
.sheet-up{animation:sheetUp 340ms cubic-bezier(.22,.61,.36,1) forwards;}
.expand-in{animation:expandIn 260ms cubic-bezier(.22,.61,.36,1) both;}
/* respect the OS-level reduced motion setting */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:1ms !important;animation-iteration-count:1 !important;transition-duration:1ms !important;scroll-behavior:auto !important;}
}
/* the in-app "motion off" toggle: stop movement but keep state changes instant */
.motion-off *,.motion-off *::before,.motion-off *::after{animation:none !important;transition-duration:1ms !important;}
/* Desktop sidebar visible, mobile hidden */
.app-aside{display:flex;}
@media(max-width:860px){.app-aside{display:none !important;} .show-mobile{display:flex !important;} .hide-mobile{display:none !important;}}
@media(min-width:861px){.show-mobile{display:none !important;}}
/* Bottom mobile nav */
.mobile-nav{display:none;}
@media(max-width:860px){.mobile-nav{display:flex;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useRef, useCallback} = React;

/* ── utils ────────────────────────────────────────────────────── */
function css(str) {
  if (!str) return {};
  const res = {};
  str.split(';').forEach(d => {
    d = d.trim(); if (!d) return;
    const ci = d.indexOf(':'); if (ci < 0) return;
    const p = d.slice(0, ci).trim(), v = d.slice(ci + 1).trim();
    if (!p || !v) return;
    res[p.replace(/-([a-z])/g, (_, c) => c.toUpperCase())] = v;
  });
  return res;
}
function st(...strs) { return Object.assign({}, ...strs.map(s => s ? css(s) : {})); }
function fmt(sec) { const m = Math.floor(sec / 60), s = sec % 60; return m + ':' + (s < 10 ? '0' : '') + s; }

/* ── Interactive element ──────────────────────────────────────── */
function El({ tag: T = 'div', s = '', hs = '', as_ = '', fs = '', className, children, onClick, ...rest }) {
  const [h, sh] = useState(false), [a, sa] = useState(false), [f, sf] = useState(false);
  const style = st(s, h && hs, a && as_, f && fs);
  return React.createElement(T, {
    className, style, onClick,
    onMouseEnter:()=>sh(true), onMouseLeave:()=>{sh(false);sa(false);},
    onMouseDown:()=>sa(true), onMouseUp:()=>sa(false),
    onFocus:()=>sf(true), onBlur:()=>sf(false),
    ...rest
  }, children);
}

/* ── Style helpers ────────────────────────────────────────────── */
function seg(active) {
  return active
    ? 'background:var(--accent);color:var(--on-accent);border:1px solid var(--accent);border-radius:10px;padding:11px 8px;font-size:calc(14px * var(--ts));font-weight:600;'
    : 'background:var(--surface);color:var(--ink-soft);border:1px solid var(--line);border-radius:10px;padding:11px 8px;font-size:calc(14px * var(--ts));font-weight:500;';
}
function chip(active) {
  return active
    ? 'background:var(--accent);color:var(--on-accent);border:1px solid var(--accent);border-radius:999px;padding:9px 16px;font-size:calc(13px * var(--ts));font-weight:600;'
    : 'background:var(--surface);color:var(--ink-soft);border:1px solid var(--line);border-radius:999px;padding:9px 16px;font-size:calc(13px * var(--ts));font-weight:500;';
}

/* ── Data ─────────────────────────────────────────────────────── */
const TOOLS = [
  {id:'capacity',glyph:'⚖',hue:'#4f9d7b',hueText:'#3c7c5f',name:'Capacity Check',desc:'See the real cost before you say yes.'},
  {id:'sensory', glyph:'○',hue:'#4f88cf',hueText:'#356eb4',name:'Sensory Reset',  desc:'A calm, timed way back into your body.'},
  {id:'scripts', glyph:'"',hue:'#9572c4',hueText:'#7f5cb2',name:'Scripts',         desc:'Declines, asks, and late replies, ready to send.'},
  {id:'ledger',  glyph:'≡',hue:'#2ba395',hueText:'#1e7e72',name:'Capacity Ledger',desc:'Track load and recovery. No scores.'},
  {id:'recovery',glyph:'↻',hue:'#d8814f',hueText:'#a85528',name:'Recovery Plan',  desc:'A gentle re-entry after the big thing.'},
  {id:'parking', glyph:'□',hue:'#c2a83a',hueText:'#786824',name:'Parking Lot',    desc:'Somewhere for floating tasks to land.'},
];
/* bright hues for decoration (dots, tiles, glows); darker hueText for accessible text + button fills */
const TOOL_HUES = {capacity:'#4f9d7b',sensory:'#4f88cf',scripts:'#9572c4',ledger:'#2ba395',recovery:'#d8814f',parking:'#c2a83a'};
const TOOL_HUES_TEXT = {capacity:'#3c7c5f',sensory:'#356eb4',scripts:'#7f5cb2',ledger:'#1e7e72',recovery:'#a85528',parking:'#786824'};
/* single, brighter light theme (no dark / alternate modes). accent is the AA-safe text/fill green; bright greens live in BRAND_GRAD for decoration */
const THEME = {bg:'#f5f2ec',surface:'#ffffff','surface-2':'#edeef0',ink:'#2b2f37','ink-soft':'#69707c',line:'#e8e3d9',accent:'#3c7c5f','accent-2':'#5a6a90','accent-soft':'#e7f1ec','on-accent':'#ffffff'};
const BRAND_GRAD = 'linear-gradient(135deg,#4f88cf,#4f9d7b 52%,#9572c4)';
const CARD_SH = '0 2px 10px rgba(40,50,60,.05)';
const SCRIPT_DATA = {
  declines:["Thanks for thinking of me! I'm maxed out right now, so I've got to pass this time.","I can't take this on without something else slipping, so it's a no for now. Appreciate you asking.","Honestly, I don't have the bandwidth to do this one well, so I'm going to sit it out."],
  tiered:  ["I can't do the whole thing, but I could [smaller part] by [date] if that helps?","Can't lead this one, but happy to look it over once or be a sounding board.","I'm in, but I'll need [thing] to pull it off without burning out. Does that work?"],
  ask:     ["Quick thing: I do way better with [an agenda ahead / written steps]. Could we do that?","My memory goes blank after meetings. Could you drop me a few notes afterward?","Any chance we move this to [async / a quieter time]? I'll be a lot more on it."],
  late:    ["Sorry for the slow reply! My brain ran off with it, not my heart. Still very much in.","I went quiet, not cold. Picking this back up now if it's still helpful.","Late, I know, but I didn't forget about you. Here's where I landed: [answer]"],
  exit:    ["I need to step back from [thing]. I'll hand [item] over to [person] by [date].","Realized I can't keep this up. I'd like to wrap [X], then pass it on.","Leaving this in good shape, not bailing last minute. Here's the handoff: [notes]"],
  help:    ["I'm drowning a bit this week. Any chance you could take [task]? I'll owe you.","Could use a hand with [thing] before [date]. Even 20 minutes would help a ton.","Would you body-double with me on [task]? I just need someone else on the call."],
};
const SCRIPT_CATS = [{id:'declines',label:'Say no'},{id:'tiered',label:'Smaller yes'},{id:'ask',label:'Ask for what I need'},{id:'late',label:'Late reply'},{id:'exit',label:'Exit'},{id:'help',label:'Ask for help'}];
const LED_CATS  = [{id:'work',label:'Work & meetings',kind:'demand'},{id:'social',label:'People & social',kind:'demand'},{id:'sensory',label:'Sensory & travel',kind:'demand'},{id:'admin',label:'Errands & admin',kind:'demand'},{id:'recovery',label:'Rest & recovery',kind:'recovery'}];
const LED_LOADS = [{id:'light',label:'A little',w:1},{id:'medium',label:'Some',w:2},{id:'heavy',label:'A lot',w:3}];
const REC_FACTORS = [{id:'people',label:'People'},{id:'noise',label:'Noise'},{id:'light',label:'Bright light'},{id:'travel',label:'Travel'},{id:'masking',label:'Masking'},{id:'decisions',label:'Decisions'},{id:'long',label:'Long day'}];

/* ── Persistence ──────────────────────────────────────────────── */
function load() { try { return JSON.parse(localStorage.getItem('audhd_tools_v2')) || {}; } catch { return {}; } }
function persist(s) { try { localStorage.setItem('audhd_tools_v2', JSON.stringify({theme:s.theme,textSize:s.textSize,motion:s.motion,account:s.account,newsletter:s.newsletter,ccHistory:s.ccHistory,srLen:s.srLen,scrFav:s.scrFav,ledger:s.ledger,recSaved:s.recSaved,parking:s.parking})); } catch {} }

/* ── CheckRow ─────────────────────────────────────────────────── */
function CheckRow({done, onToggle, text, num}) {
  return (
    <button onClick={onToggle} style={{display:'flex',alignItems:'center',gap:'12px',width:'100%',textAlign:'left',border:'1px solid var(--line)',borderRadius:'12px',padding:'13px 16px',fontSize:'calc(15px * var(--ts))',color:'var(--ink)',background:done?'var(--accent-soft)':'var(--surface)',transition:'background 200ms',cursor:'pointer'}}>
      <span style={{flex:'none',width:'24px',height:'24px',borderRadius:num?'50%':'7px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,background:done?'var(--accent)':(num?'var(--accent-soft)':'transparent'),color:done?'var(--on-accent)':'var(--accent)',border:`2px solid ${done?'var(--accent)':(num?'transparent':'var(--line)')}`}}>
        {done ? '✓' : (num ? String(num) : '')}
      </span>
      <span style={{textAlign:'left',flex:1}}>{text}</span>
    </button>
  );
}

/* ══════════════════════════════════════════════════════════════ */
/*  SCREENS                                                        */
/* ══════════════════════════════════════════════════════════════ */

/* ── Welcome ──────────────────────────────────────────────────── */
function Welcome({play, go}) {
  return (
    <section style={{position:'relative',overflow:'hidden',minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:'56px clamp(20px,5vw,40px)'}}>
      {/* two soft, still washes: no motion, very faint, just a hint of warmth */}
      <div style={{position:'absolute',top:'-14%',left:'50%',transform:'translateX(-50%)',width:'min(740px,98vw)',height:'min(740px,98vw)',borderRadius:'50%',background:'radial-gradient(circle,color-mix(in srgb,#4f9d7b 7%,transparent),transparent 60%)',pointerEvents:'none'}}></div>
      <div style={{position:'absolute',bottom:'0%',right:'4%',width:'380px',height:'380px',borderRadius:'50%',background:'radial-gradient(circle,color-mix(in srgb,#9572c4 5%,transparent),transparent 70%)',filter:'blur(34px)',pointerEvents:'none'}}></div>

      <div style={{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',maxWidth:'680px',width:'100%'}} className="slide-up">
        {/* logo */}
        <div style={{display:'flex',alignItems:'center',gap:'11px',marginBottom:'26px'}}>
          <span style={{width:'42px',height:'42px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#4f88cf,#4f9d7b 52%,#9572c4)',color:'#fff',fontWeight:700,fontSize:'21px',boxShadow:'0 8px 22px color-mix(in srgb,var(--accent) 28%,transparent)'}}>∞</span>
          <span style={{fontFamily:"'Lexend',sans-serif",fontWeight:700,fontSize:'calc(23px * var(--ts))',letterSpacing:'-0.02em'}}>AuTools</span>
        </div>
        {/* friendly greeting */}
        <span style={{display:'inline-flex',alignItems:'center',gap:'14px',fontFamily:"'Lexend',sans-serif",fontSize:'clamp(38px,7vw,60px)',fontWeight:700,color:'var(--ink)',letterSpacing:'-0.02em',marginBottom:'18px'}}>
          <span style={{fontSize:'1.05em',display:'inline-block',transformOrigin:'72% 78%',animation:'wave 2.6s ease-in-out 1',animationPlayState:play}}>👋</span>
          Hello
        </span>

        <h1 style={{fontFamily:"'Lexend',sans-serif",fontWeight:500,fontSize:'clamp(26px,4.4vw,44px)',lineHeight:1.18,letterSpacing:'-0.02em',margin:'0 0 32px',maxWidth:'17ch'}}>
          We built free tools for your <span style={{color:'#3c7c5f'}}>neurodivergent</span> brain, so you don't have to work in overdrive.
        </h1>

        <El tag="button" onClick={()=>go('home')}
          s="white-space:nowrap;background:var(--accent);color:var(--on-accent);border:none;border-radius:999px;padding:16px 40px;font-size:calc(16px * var(--ts));font-weight:600;box-shadow:0 12px 30px color-mix(in srgb,var(--accent) 32%,transparent);transition:transform 220ms,opacity 220ms,box-shadow 220ms;"
          hs="opacity:.94;transform:translateY(-2px);box-shadow:0 18px 38px color-mix(in srgb,var(--accent) 40%,transparent);"
          as_="transform:scale(.97);">Show me the tools →</El>
      </div>
    </section>
  );
}

/* ── Home ─────────────────────────────────────────────────────── */
function ToolCard({tool, onSelect}) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onSelect} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{position:'relative',overflow:'hidden',textAlign:'left',display:'flex',flexDirection:'column',gap:'11px',padding:'22px',minHeight:'192px',background:'var(--surface)',border:`1px solid ${hov?`color-mix(in srgb,${tool.hue} 55%,var(--line))`:'var(--line)'}`,borderRadius:'var(--radius)',transition:'transform 220ms cubic-bezier(.22,.61,.36,1),border-color 220ms,box-shadow 220ms',transform:hov?'translateY(-5px)':'none',boxShadow:hov?`0 16px 34px color-mix(in srgb,${tool.hue} 20%,transparent)`:'0 2px 10px rgba(40,50,60,.05)',cursor:'pointer'}}>
      <span style={{position:'relative',width:'46px',height:'46px',borderRadius:'14px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'21px',background:`linear-gradient(140deg,color-mix(in srgb,${tool.hue} 26%,#fff),color-mix(in srgb,${tool.hue} 11%,#fff))`,color:tool.hueText,boxShadow:`0 6px 16px color-mix(in srgb,${tool.hue} 18%,transparent)`}}>{tool.glyph}</span>
      <strong style={{position:'relative',fontSize:'calc(17px * var(--ts))',fontWeight:600}}>{tool.name}</strong>
      <small style={{position:'relative',fontSize:'calc(13px * var(--ts))',color:'var(--ink-soft)',flex:1,lineHeight:1.45}}>{tool.desc}</small>
      <span style={{position:'relative',fontSize:'calc(13px * var(--ts))',color:tool.hueText,fontWeight:700}}>Open →</span>
    </button>
  );
}

function Home({goTool}) {
  return (
    <section style={{maxWidth:'1040px',margin:'0 auto',padding:'clamp(40px,6vw,72px) clamp(16px,4vw,40px) 80px'}}>
      <h1 style={{fontFamily:"'Lexend',sans-serif",fontWeight:600,fontSize:'clamp(30px,5.2vw,48px)',lineHeight:1.08,letterSpacing:'-0.025em',margin:'0 0 12px'}}>Your tools, <span style={{color:'#3c7c5f'}}>free.</span></h1>
      <p style={{fontSize:'calc(17px * var(--ts))',color:'var(--ink-soft)',margin:'0 0 32px',maxWidth:'42ch'}}>Pick whatever helps today. No account, no catch.</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(248px,1fr))',gap:'14px'}}>
        {TOOLS.map(t => <ToolCard key={t.id} tool={t} onSelect={()=>goTool(t.id)} />)}
      </div>
      <p style={{textAlign:'center',fontSize:'calc(14px * var(--ts))',color:'var(--ink-soft)',margin:'48px 0 0'}}>More tools are on the way. These six stay free.</p>
    </section>
  );
}

/* ── Shared back button ───────────────────────────────────────── */
function Back({goHome}) {
  return (
    <El tag="button" onClick={goHome}
      s="display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--ink-soft);font-size:calc(14px * var(--ts));padding:0;margin-bottom:20px;font-weight:500;"
      hs="color:var(--ink);">← Back</El>
  );
}

/* ── Tool header ──────────────────────────────────────────────── */
function ToolHeader({glyph, hue, hueText, title, sub}) {
  return (
    <>
      <div style={{display:'flex',alignItems:'center',gap:'12px',margin:'0 0 6px'}}>
        <span style={{flex:'none',width:'48px',height:'48px',borderRadius:'15px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'23px',background:`linear-gradient(140deg,color-mix(in srgb,${hue} 28%,#fff),color-mix(in srgb,${hue} 12%,#fff))`,color:hueText||hue,boxShadow:`0 8px 20px color-mix(in srgb,${hue} 20%,transparent)`,border:`1px solid color-mix(in srgb,${hue} 22%,transparent)`}}>{glyph}</span>
        <h1 style={{fontFamily:"'Lexend',sans-serif",fontWeight:600,fontSize:'clamp(24px,4.5vw,38px)',margin:0,letterSpacing:'-0.02em'}}>{title}</h1>
      </div>
      {sub && <p style={{fontSize:'calc(16px * var(--ts))',color:'var(--ink-soft)',margin:'0 0 24px'}}>{sub}</p>}
    </>
  );
}

/* ── Capacity Check ───────────────────────────────────────────── */
function Capacity({state, setState, goHome}) {
  const {ccThing, ccF, ccBen, ccResult, ccHistory} = state;
  const lvl = [{id:'low',label:'Low'},{id:'med',label:'Some'},{id:'high',label:'High'}];
  const fdefs = [{key:'recovery',label:'Recovery cost'},{key:'sensory',label:'Sensory load'},{key:'logistics',label:'Travel & logistics'},{key:'masking',label:'Masking'},{key:'decision',label:'Decisions'}];

  function run() {
    const m={low:0,med:1,high:2};
    const sum = m[ccF.recovery]+m[ccF.sensory]+m[ccF.logistics]+m[ccF.masking]+m[ccF.decision];
    let reading,body,cat,catLabel;
    if(sum<=3){reading='Affordable';body='The cost looks manageable. A clear yes is fine. Just protect a little recovery.';cat='ask';catLabel='See accommodation asks';}
    else if(sum<=6){reading='Negotiate it';body='There is real cost here. A smaller yes or one accommodation could make it work.';cat='tiered';catLabel='See smaller-yes scripts';}
    else if(sum<=8){reading='High cost';body='This takes a lot. If it is a yes, build in recovery now. A no is also complete.';cat='declines';catLabel='See decline scripts';}
    else{reading='Costs too much';body='Expensive on every axis. Unless it deeply matters, this is a kind no.';cat='declines';catLabel='See decline scripts';}
    if(ccBen==='them'&&sum>=5) body+=' The benefit is mostly someone else\'s, so you do not owe a yes.';
    const color=sum<=3?'#467a5b':sum<=6?'#806829':sum<=8?'#a85528':'#9a4636';
    const entry={id:Date.now(),thing:ccThing.trim()||'Unnamed',reading};
    setState(s=>({...s,ccResult:{reading,body,cat,catLabel,color,cost:'Cost '+sum+' / 10',pct:Math.round((sum/10)*100)+'%'},ccHistory:[entry,...s.ccHistory].slice(0,6)}));
  }

  return (
    <section style={{maxWidth:'720px',margin:'0 auto',padding:'clamp(24px,4vw,40px) clamp(16px,4vw,40px) 100px'}}>
      <Back goHome={goHome}/>
      <ToolHeader glyph="⚖" hue="#4f9d7b" hueText="#3c7c5f" title="Capacity check" sub="Before you say yes. Tap the honest answer."/>
      <input value={ccThing} onChange={e=>setState(s=>({...s,ccThing:e.target.value}))} placeholder="What are you considering?"
        style={{width:'100%',padding:'14px 16px',border:'1px solid var(--line)',borderRadius:'12px',background:'var(--surface)',color:'var(--ink)',fontSize:'calc(15px * var(--ts))',marginBottom:'22px',outline:'none'}}/>
      <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
        {fdefs.map(d=>(
          <div key={d.key}>
            <span style={{fontSize:'calc(15px * var(--ts))',fontWeight:600,display:'block',marginBottom:'8px'}}>{d.label}</span>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}}>
              {lvl.map(o=><button key={o.id} onClick={()=>setState(s=>({...s,ccF:{...s.ccF,[d.key]:o.id}}))} style={css(seg(ccF[d.key]===o.id))}>{o.label}</button>)}
            </div>
          </div>
        ))}
        <div>
          <span style={{fontSize:'calc(15px * var(--ts))',fontWeight:600,display:'block',marginBottom:'8px'}}>Who benefits?</span>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}}>
            {[{id:'me',label:'Me'},{id:'mutual',label:'Both'},{id:'them',label:'Them'}].map(o=>(
              <button key={o.id} onClick={()=>setState(s=>({...s,ccBen:o.id}))} style={css(seg(ccBen===o.id))}>{o.label}</button>
            ))}
          </div>
        </div>
      </div>
      <El tag="button" onClick={run}
        s="margin-top:24px;width:100%;background:var(--accent);color:var(--on-accent);border:none;border-radius:12px;padding:16px;font-size:calc(16px * var(--ts));font-weight:600;"
        as_="transform:scale(.99);">Read the cost</El>
      {ccResult&&(
        <div style={{marginTop:'22px',background:'var(--surface)',border:'1px solid var(--accent)',borderRadius:'var(--radius)',padding:'24px',boxShadow:CARD_SH,animation:'pop 200ms ease-out'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}}>
            <span style={{width:'10px',height:'10px',borderRadius:'50%',background:ccResult.color,flex:'none'}}></span>

/* ── Sensory Reset ────────────────────────────────────────────── */
function Sensory({state, setState, timerRef, goHome}) {
  const {srLen,srRemaining,srRunning,srDone,breathPhase,motion} = state;
  const play = motion==='still'?'paused':'running';

  function getSteps() {
    if(srLen==='s30') return ['Stop. Feet flat on the floor.','One slow breath, all the way out.','Unclench your jaw and shoulders.'];
    if(srLen==='m5') return ['Lower the light or look away from screens.','Water, even a sip.','Loosen one input: sound or clothing.','Slow your breathing with the circle.','Name one small next action.'];
    return ['Feet flat on the floor.','Drink water, even a sip.','Soften or close your eyes.','Breathe all the way out, twice.'];
  }
  const dur = {s30:30,m1:60,m5:300}[srLen]||60;

  function stopBreath(){if(timerRef.breathT){clearTimeout(timerRef.breathT);timerRef.breathT=null;}}
  function startBreath(){
    stopBreath();
    if(motion==='still'){setState(s=>({...s,breathPhase:'in'}));return;}
    const cycle=()=>{
      setState(s=>({...s,breathPhase:'in'}));
      timerRef.breathT=setTimeout(()=>{setState(s=>({...s,breathPhase:'out'}));timerRef.breathT=setTimeout(cycle,5800);},4200);
    };
    cycle();
  }
  function toggle(){
    if(srRunning){if(timerRef.sr){clearInterval(timerRef.sr);timerRef.sr=null;}stopBreath();setState(s=>({...s,srRunning:false,breathPhase:'idle'}));return;}
    const start=srRemaining>0?srRemaining:dur;
    setState(s=>({...s,srRemaining:start,srRunning:true}));
    if(timerRef.sr)clearInterval(timerRef.sr);
    timerRef.sr=setInterval(()=>{setState(s=>{const r=s.srRemaining-1;if(r<=0){clearInterval(timerRef.sr);timerRef.sr=null;stopBreath();return{...s,srRemaining:0,srRunning:false,breathPhase:'idle'};}return{...s,srRemaining:r};});},1000);
    startBreath();
  }
  function reset(){if(timerRef.sr){clearInterval(timerRef.sr);timerRef.sr=null;}stopBreath();setState(s=>({...s,srRemaining:0,srRunning:false,srDone:{},breathPhase:'idle'}));}

  const ph=breathPhase, still=motion==='still';
  const bStyle={position:'absolute',inset:0,borderRadius:'50%',background:'radial-gradient(circle,var(--accent-soft),transparent 70%)',...(still?{transform:'scale(1)',opacity:.7}:ph==='in'?{transform:'scale(1.18)',opacity:1,transition:'transform 4.2s ease-in-out,opacity 4.2s ease-in-out'}:ph==='out'?{transform:'scale(.78)',opacity:.5,transition:'transform 5.8s ease-in-out,opacity 5.8s ease-in-out'}:{transform:'scale(.92)',opacity:.6,transition:'transform 1s ease-in-out,opacity 1s ease-in-out'})};
  const rStyle={position:'absolute',inset:'30px',borderRadius:'50%',border:'2px solid var(--accent)',opacity:.5,...(still?{transform:'scale(1)'}:ph==='in'?{transform:'scale(1.1)',transition:'transform 4.2s ease-in-out'}:ph==='out'?{transform:'scale(.86)',transition:'transform 5.8s ease-in-out'}:{transform:'scale(1)',transition:'transform 1s ease-in-out'})};

  return (
    <section style={{maxWidth:'720px',margin:'0 auto',padding:'clamp(24px,4vw,40px) clamp(16px,4vw,40px) 100px'}}>
      <Back goHome={goHome}/>
      <ToolHeader glyph="○" hue="#4f88cf" hueText="#356eb4" title="Sensory reset" sub="Too loud? Pick a length. Breathe with the circle."/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',marginBottom:'24px'}}>
        {[{id:'s30',label:'30 sec'},{id:'m1',label:'1 min'},{id:'m5',label:'5 min'}].map(o=>(
          <button key={o.id} onClick={()=>{if(timerRef.sr){clearInterval(timerRef.sr);timerRef.sr=null;}stopBreath();setState(s=>({...s,srLen:o.id,srRemaining:0,srRunning:false,srDone:{},breathPhase:'idle'}));}} style={css(seg(srLen===o.id))}>{o.label}</button>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'8px 0 30px'}}>
        <div style={{position:'relative',width:'230px',height:'230px',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div style={bStyle}></div>
          <div style={rStyle}></div>
          <div style={{position:'relative',textAlign:'center'}}>
            <div style={{fontSize:'calc(50px * var(--ts))',fontWeight:500,fontVariantNumeric:'tabular-nums',fontFamily:"'JetBrains Mono',monospace",letterSpacing:'-0.04em'}}>{fmt(srRemaining>0?srRemaining:dur)}</div>
            <div style={{fontSize:'calc(13px * var(--ts))',color:'var(--ink-soft)'}}>{!srRunning?'press start':ph==='out'?'breathe out':ph==='in'?'breathe in':'breathe'}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:'10px',marginTop:'22px'}}>
          <El tag="button" onClick={toggle} s="background:var(--accent);color:var(--on-accent);border:none;border-radius:999px;padding:13px 32px;font-size:calc(15px * var(--ts));font-weight:600;" as_="transform:scale(.96);">{srRunning?'Pause':srRemaining>0?'Resume':'Start'}</El>
          <button onClick={reset} style={{background:'var(--surface)',color:'var(--ink)',border:'1px solid var(--line)',borderRadius:'999px',padding:'13px 22px',fontSize:'calc(15px * var(--ts))',fontWeight:600,cursor:'pointer'}}>Reset</button>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
        {getSteps().map((text,i)=><CheckRow key={i} done={!!srDone[i]} onToggle={()=>setState(s=>({...s,srDone:{...s.srDone,[i]:!s.srDone[i]}}))} text={text} num={i+1}/>)}
      </div>
    </section>
  );
}

/* ── Capacity Ledger ──────────────────────────────────────────── */
function Ledger({state, setState, goHome}) {
  const {ledger,ledLabel,ledCat,ledLoad} = state;
  const wOf=id=>(LED_LOADS.find(l=>l.id===id)||{w:1}).w;
  const kOf=id=>(LED_CATS.find(c=>c.id===id)||{kind:'demand'}).kind;
  const loadLabel=id=>(LED_LOADS.find(l=>l.id===id)||{label:''}).label;
  const labOf=id=>(LED_CATS.find(c=>c.id===id)||{label:''}).label;
  let demand=0,recov=0;
  ledger.forEach(i=>{const w=wOf(i.load);if(kOf(i.cat)==='recovery')recov+=w;else demand+=w;});
  const max=Math.max(demand,recov,8);

        {[{label:'Takes energy',icon:'−',color:'var(--accent-2)',val:demand,pct:Math.round((demand/max)*100)},{label:'Gives energy back',icon:'+',color:'var(--accent)',val:recov,pct:Math.round((recov/max)*100)}].map(x=>(

              <span style={{fontSize:'calc(13px * var(--ts))',color:'var(--ink-soft)'}}>{x.label}</span>

            <div style={{fontSize:'calc(30px * var(--ts))',fontWeight:500,color:x.color,fontFamily:"'JetBrains Mono',monospace"}}>{x.val}</div>
            <div style={{height:'6px',borderRadius:'999px',background:'var(--surface-2)',marginTop:'8px',overflow:'hidden'}}>
              <div style={{height:'100%',width:x.pct+'%',background:x.color,transition:'width 300ms'}}></div>
            </div>
          </div>
        ))}
      </div>
      <p style={{fontSize:'calc(15px * var(--ts))',background:'var(--accent-soft)',borderRadius:'12px',padding:'13px 16px',margin:'0 0 22px'}}>{msg}</p>
      <div style={{display:'flex',flexDirection:'column',gap:'10px',background:'var(--surface)',border:'1px solid var(--line)',borderRadius:'var(--radius)',padding:'18px',marginBottom:'22px',boxShadow:CARD_SH}}>
        <input value={ledLabel} onChange={e=>setState(s=>({...s,ledLabel:e.target.value}))} placeholder="Name it" style={{width:'100%',padding:'12px 14px',border:'1px solid var(--line)',borderRadius:'10px',background:'var(--bg)',color:'var(--ink)',fontSize:'calc(15px * var(--ts))',outline:'none'}}/>
        <span style={{fontSize:'calc(13px * var(--ts))',color:'var(--ink-soft)',fontWeight:600}}>What kind?</span>
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>{LED_CATS.map(o=><button key={o.id} onClick={()=>setState(s=>({...s,ledCat:o.id}))} style={css(chip(ledCat===o.id))}>{o.label}</button>)}</div>
        <span style={{fontSize:'calc(13px * var(--ts))',color:'var(--ink-soft)',fontWeight:600}}>How much energy?</span>
        <div style={{display:'flex',gap:'6px'}}>{LED_LOADS.map(o=><button key={o.id} onClick={()=>setState(s=>({...s,ledLoad:o.id}))} style={css(seg(ledLoad===o.id))}>{o.label}</button>)}</div>

          style={{background:'var(--accent)',color:'var(--on-accent)',border:'none',borderRadius:'10px',padding:'13px',fontSize:'calc(15px * var(--ts))',fontWeight:600,cursor:'pointer'}}>Add</button>
      </div>
      {ledger.length===0?<div style={{textAlign:'center',padding:'30px',border:'2px dashed var(--line)',borderRadius:'var(--radius)',color:'var(--ink-soft)',fontSize:'calc(14px * var(--ts))'}}>Nothing logged yet. Add what took energy, and what gave it back.</div>:

          </div>
        ))}</div>}
    </section>
  );
}

/* ── Recovery Plan ────────────────────────────────────────────── */
function Recovery({state, setState, goHome}) {
  const {recEvent,recTaxed,recPlan,recDone,recSaved,recJustSaved} = state;
  function build(){
    const t=recTaxed;
    const today=['Hydrate and eat something easy.','Lower the light and sound.'];
    if(t.includes('masking'))today.push('No performing tonight. Drop the mask.');
    if(t.includes('people'))today.push('No more social input today.');
    const tomorrow=['Move or cancel one nonessential thing.','One gentle thing you like.'];
    if(t.includes('travel'))tomorrow.push('No extra trips. Stay close to home.');
    if(t.includes('decisions'))tomorrow.push('Pre-decide meals and clothes.');
    const week=['Protect one real recovery block.','Re-enter slowly. Half-capacity counts.'];
    if(t.includes('long'))week.push('Earlier nights for a few days.');
    if(t.includes('noise')||t.includes('light'))week.push('Keep one quiet, dim space each day.');
    setState(s=>({...s,recPlan:[{key:'today',title:'Today',items:today},{key:'tomorrow',title:'Tomorrow',items:tomorrow},{key:'week',title:'This week',items:week}],recDone:{},recJustSaved:false}));
  }
  function save(){
    const ev=recEvent.trim()||'A taxing day';
    const labels=REC_FACTORS.filter(f=>recTaxed.includes(f.id)).map(f=>f.label);
    setState(s=>({...s,recSaved:[{id:Date.now(),event:ev,summary:labels.length?labels.join(', '):'general overload'},...s.recSaved].slice(0,8),recJustSaved:true}));
  }
  return (
    <section style={{maxWidth:'720px',margin:'0 auto',padding:'clamp(24px,4vw,40px) clamp(16px,4vw,40px) 100px'}}>
      <Back goHome={goHome}/>
      <ToolHeader glyph="↻" hue="#d8814f" hueText="#a85528" title="Recovery plan" sub="After a big thing. What drained you?"/>
      <input value={recEvent} onChange={e=>setState(s=>({...s,recEvent:e.target.value}))} placeholder="What happened?"
        style={{width:'100%',padding:'14px 16px',border:'1px solid var(--line)',borderRadius:'12px',background:'var(--surface)',color:'var(--ink)',fontSize:'calc(15px * var(--ts))',marginBottom:'18px',outline:'none'}}/>
      <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'22px'}}>
        {REC_FACTORS.map(f=><button key={f.id} onClick={()=>setState(s=>({...s,recTaxed:s.recTaxed.includes(f.id)?s.recTaxed.filter(x=>x!==f.id):[...s.recTaxed,f.id]}))} style={css(chip(recTaxed.includes(f.id)))}>{f.label}</button>)}
      </div>
      <El tag="button" onClick={build} s="width:100%;background:var(--accent);color:var(--on-accent);border:none;border-radius:12px;padding:16px;font-size:calc(16px * var(--ts));font-weight:600;" as_="transform:scale(.99);">Make my plan</El>
      {recPlan&&<div style={{marginTop:'24px',display:'flex',flexDirection:'column',gap:'14px'}}>
        {recPlan.map(sec=>(
          <div key={sec.key} style={{background:'var(--surface)',border:'1px solid var(--line)',borderRadius:'var(--radius)',padding:'20px',boxShadow:CARD_SH}}>
            <div style={{fontSize:'calc(13px * var(--ts))',fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:'10px'}}>{sec.title}</div>
            <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
              {sec.items.map((text,i)=>{const key=sec.key+'-'+i;return<CheckRow key={key} done={!!recDone[key]} onToggle={()=>setState(s=>({...s,recDone:{...s.recDone,[key]:!s.recDone[key]}}))} text={text}/>;})}</div>
          </div>
        ))}
        <button onClick={save} style={{alignSelf:'flex-start',background:'var(--accent-soft)',color:'var(--ink)',border:'none',borderRadius:'999px',padding:'12px 22px',fontSize:'calc(14px * var(--ts))',fontWeight:600,cursor:'pointer'}}>{recJustSaved?'Saved ✓':'Save this plan'}</button>
      </div>}
      {recSaved.length>0&&<div style={{marginTop:'28px'}}>
        <div style={{fontSize:'calc(14px * var(--ts))',fontWeight:600,marginBottom:'10px'}}>Saved plans</div>
        {recSaved.map(p=>(
          <div key={p.id} style={{display:'flex',justifyContent:'space-between',gap:'12px',background:'var(--surface)',border:'1px solid var(--line)',borderRadius:'12px',padding:'12px 16px',marginBottom:'8px'}}>
            <div><div style={{fontSize:'calc(14px * var(--ts))',fontWeight:600}}>{p.event}</div><div style={{fontSize:'calc(12px * var(--ts))',color:'var(--ink-soft)'}}>{p.summary}</div></div>
            <button onClick={()=>setState(s=>({...s,recSaved:s.recSaved.filter(x=>x.id!==p.id)}))} style={{background:'none',border:'none',color:'var(--ink-soft)',fontSize:'18px',padding:'0 4px',cursor:'pointer'}}>×</button>
          </div>
        ))}
      </div>}
    </section>
  );
}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(190px,1fr))',gap:'16px'}}>
        {parking.map((i,idx)=>{const tint=(deep?tintsDark:tints)[idx%6];return(
          <div key={i.id} style={{position:'relative',display:'flex',flexDirection:'column',gap:'12px',minHeight:'128px',padding:'22px 16px 14px',borderRadius:'4px',background:tint,color:noteInk,boxShadow:`0 6px 16px rgba(20,20,15,${deep?.3:.14})`,transform:`rotate(${rots[idx%6]})`,opacity:i.done?.6:1}}>
            <button onClick={()=>setState(s=>({...s,parking:s.parking.filter(x=>x.id!==i.id)}))} style={{position:'absolute',top:'8px',right:'10px',background:'none',border:'none',color:noteInk,fontSize:'18px',lineHeight:1,padding:'2px',opacity:.55,cursor:'pointer'}}>×</button>
            <span style={{position:'absolute',top:'-7px',left:'18px',width:'14px',height:'14px',borderRadius:'50%',background:'var(--accent)',boxShadow:'0 2px 4px rgba(40,40,30,.25)'}}></span>
            <span style={{flex:1,fontSize:'calc(15px * var(--ts))',lineHeight:1.4,textDecoration:i.done?'line-through':'none',opacity:i.done?.7:1}}>{i.text}</span>
            <button onClick={()=>setState(s=>({...s,parking:s.parking.map(x=>x.id===i.id?{...x,done:!x.done}:x)}))}
              style={{alignSelf:'flex-start',display:'inline-flex',alignItems:'center',gap:'6px',border:'none',borderRadius:'999px',padding:'7px 14px',fontSize:'calc(12px * var(--ts))',fontWeight:600,cursor:'pointer',background:i.done?'rgba(95,125,112,.95)':(deep?'rgba(255,255,255,.14)':'rgba(255,255,255,.6)'),color:i.done?'#fff':noteInk}}>
              {i.done?'✓ Done':'Mark done'}
            </button>
          </div>
        );})}
      </div>}
      {doneCt>0&&<button onClick={()=>setState(s=>({...s,parking:s.parking.filter(i=>!i.done)}))} style={{marginTop:'18px',background:'none',border:'1px solid var(--line)',color:'var(--ink-soft)',borderRadius:'999px',padding:'10px 18px',fontSize:'calc(13px * var(--ts))',cursor:'pointer'}}>Clear done ({doneCt})</button>}
    </section>
  );
}

/* ── Account / Login ──────────────────────────────────────────── */
function Account({state, setState, goHome, goTool}) {
  const {account,authName,authEmail,authPass,authMode,authError,authNews} = state;
  const isSignup = authMode==='signup';

  function submit(){
    const name=authName.trim(),email=authEmail.trim(),pass=authPass;
    if(isSignup&&!name){setState(s=>({...s,authError:'Add your name so we know what to call you.'}));return;}
    if(!/^\S+@\S+\.\S+$/.test(email)){setState(s=>({...s,authError:'That email doesn\'t look right.'}));return;}
    if(pass.length<6){setState(s=>({...s,authError:'Password needs at least 6 characters.'}));return;}
    const acct={name:name||(email.split('@')[0]),email};
    const patch={account:acct,authName:'',authEmail:'',authPass:'',authError:'',view:'home'};
    if(isSignup&&authNews&&!state.newsletter) patch.newsletter={email,at:Date.now()};
    setState(s=>({...s,...patch}));window.scrollTo(0,0);
  }

  if(account) return (
    <section style={{maxWidth:'540px',margin:'0 auto',padding:'clamp(28px,5vw,56px) clamp(16px,4vw,40px) 100px'}}>
      <Back goHome={goHome}/>
      {/* profile card */}
      <div style={{background:'var(--surface)',border:'1px solid var(--line)',borderRadius:'calc(var(--radius) + 4px)',overflow:'hidden',marginBottom:'16px',boxShadow:CARD_SH}}>
        <div style={{background:'linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#9572c4))',padding:'32px 24px 24px',display:'flex',alignItems:'flex-end',gap:'16px'}}>
          <span style={{width:'64px',height:'64px',borderRadius:'50%',background:'rgba(255,255,255,.22)',backdropFilter:'blur(4px)',border:'2px solid rgba(255,255,255,.35)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'28px',fontWeight:700,color:'#fff'}}>
            {(account.name||account.email||'?').trim().charAt(0).toUpperCase()}
          </span>
          <div>
            <h1 style={{fontFamily:"'Lexend',sans-serif",fontWeight:600,fontSize:'calc(24px * var(--ts))',margin:'0 0 2px',color:'#fff',letterSpacing:'-0.02em'}}>Hi, {(account.name||'').split(' ')[0] || 'there'}.</h1>
            <p style={{fontSize:'calc(14px * var(--ts))',color:'rgba(255,255,255,.75)',margin:0}}>{account.email}</p>
          </div>
        </div>
        <div style={{padding:'20px 24px'}}>
          <div style={{fontSize:'calc(14px * var(--ts))',fontWeight:600,color:'var(--ink)',marginBottom:'12px'}}>Your tools</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:'8px',marginBottom:'20px'}}>
            {TOOLS.map(t=>(
              <button key={t.id} onClick={()=>goTool(t.id)} style={{display:'flex',flexDirection:'column',gap:'9px',padding:'14px',background:'var(--surface)',border:'1px solid var(--line)',borderRadius:'12px',textAlign:'left',cursor:'pointer',transition:'border-color 180ms,box-shadow 180ms',boxShadow:CARD_SH}}
                onMouseEnter={e=>e.currentTarget.style.borderColor=t.hue}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--line)'}>
                <span style={{width:'34px',height:'34px',borderRadius:'10px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'17px',background:`linear-gradient(140deg,color-mix(in srgb,${t.hue} 26%,#fff),color-mix(in srgb,${t.hue} 11%,#fff))`,color:t.hueText,boxShadow:`0 4px 12px color-mix(in srgb,${t.hue} 16%,transparent)`}}>{t.glyph}</span>
                <span style={{fontSize:'calc(12px * var(--ts))',fontWeight:600,color:'var(--ink)'}}>{t.name}</span>
              </button>
            ))}
          </div>
          <p style={{fontSize:'calc(14px * var(--ts))',color:'var(--ink-soft)',background:'var(--accent-soft)',borderRadius:'10px',padding:'12px 14px',margin:'0 0 20px',lineHeight:1.5}}>Your work is saved privately on this device. Creating an account syncs it across your devices once the full app launches.</p>
          <button onClick={()=>setState(s=>({...s,account:null,view:'home',authMode:'signin'}))}
            style={{width:'100%',background:'var(--surface)',color:'var(--ink)',border:'1px solid var(--line)',borderRadius:'12px',padding:'13px',fontSize:'calc(15px * var(--ts))',fontWeight:600,cursor:'pointer'}}>Sign out</button>
        </div>
      </div>
    </section>
  );

  return (
    <section style={{maxWidth:'440px',margin:'0 auto',padding:'clamp(28px,5vw,56px) clamp(16px,4vw,40px) 100px'}}>
      <Back goHome={goHome}/>
      {/* tab switcher */}
      <div style={{display:'flex',background:'var(--surface-2)',borderRadius:'12px',padding:'4px',marginBottom:'28px',gap:'4px'}}>
        {[{id:'signup',label:'Create account'},{id:'signin',label:'Sign in'}].map(m=>(
          <button key={m.id} onClick={()=>setState(s=>({...s,authMode:m.id,authError:''}))}
            style={{flex:1,padding:'10px',borderRadius:'9px',border:'none',fontSize:'calc(14px * var(--ts))',fontWeight:600,cursor:'pointer',transition:'background 180ms,color 180ms',background:authMode===m.id?'var(--surface)':'transparent',color:authMode===m.id?'var(--ink)':'var(--ink-soft)',boxShadow:authMode===m.id?'0 1px 4px rgba(0,0,0,.08)':'none'}}>
            {m.label}
          </button>
        ))}
      </div>

      <h2 style={{fontFamily:"'Lexend',sans-serif",fontWeight:500,fontSize:'calc(22px * var(--ts))',margin:'0 0 6px',letterSpacing:'-0.01em'}}>{isSignup?'Welcome to AuTools':'Welcome back'}</h2>
      <p style={{fontSize:'calc(15px * var(--ts))',color:'var(--ink-soft)',margin:'0 0 22px'}}>{isSignup?'Save your work and carry it across your devices. No spam, ever.':'Good to see you. Sign in to pick up where you left off.'}</p>

      <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
        {isSignup&&<div>
          <label style={{display:'block',fontSize:'calc(13px * var(--ts))',fontWeight:600,color:'var(--ink-soft)',marginBottom:'6px'}}>Your name</label>
          <input value={authName} onChange={e=>setState(s=>({...s,authName:e.target.value}))} placeholder="What should we call you?"
            style={{width:'100%',padding:'13px 16px',border:'1px solid var(--line)',borderRadius:'12px',background:'var(--surface)',color:'var(--ink)',fontSize:'calc(15px * var(--ts))',outline:'none'}}/>
        </div>}
        <div>
          <label style={{display:'block',fontSize:'calc(13px * var(--ts))',fontWeight:600,color:'var(--ink-soft)',marginBottom:'6px'}}>Email</label>
          <input value={authEmail} onChange={e=>setState(s=>({...s,authEmail:e.target.value}))} type="email" placeholder="you@email.com"
            style={{width:'100%',padding:'13px 16px',border:'1px solid var(--line)',borderRadius:'12px',background:'var(--surface)',color:'var(--ink)',fontSize:'calc(15px * var(--ts))',outline:'none'}}/>
        </div>
        <div>
          <label style={{display:'block',fontSize:'calc(13px * var(--ts))',fontWeight:600,color:'var(--ink-soft)',marginBottom:'6px'}}>Password</label>
          <input value={authPass} onChange={e=>setState(s=>({...s,authPass:e.target.value}))} type="password" placeholder={isSignup?"At least 6 characters":"Your password"}
            style={{width:'100%',padding:'13px 16px',border:'1px solid var(--line)',borderRadius:'12px',background:'var(--surface)',color:'var(--ink)',fontSize:'calc(15px * var(--ts))',outline:'none'}}/>
        </div>
        {isSignup&&(
          <label style={{display:'flex',alignItems:'center',gap:'11px',fontSize:'calc(14px * var(--ts))',color:'var(--ink-soft)',cursor:'pointer',padding:'2px',lineHeight:1.45}}>
            <input type="checkbox" checked={authNews} onChange={()=>setState(s=>({...s,authNews:!s.authNews}))} style={{width:'18px',height:'18px',accentColor:'var(--accent)',flex:'none',cursor:'pointer'}}/>
            Keep me updated about new tools (no spam)
          </label>
        )}
        {authError&&(
          <div style={{display:'flex',alignItems:'center',gap:'8px',background:'color-mix(in srgb,#a85f4f 12%,var(--surface))',border:'1px solid color-mix(in srgb,#a85f4f 30%,transparent)',borderRadius:'10px',padding:'11px 14px'}}>
            <span style={{color:'#a85f4f',fontWeight:700,fontSize:'16px'}}>!</span>
            <span style={{fontSize:'calc(14px * var(--ts))',color:'#a85f4f'}}>{authError}</span>
          </div>
        )}
        <El tag="button" onClick={submit}
          s="width:100%;background:var(--accent);color:var(--on-accent);border:none;border-radius:12px;padding:15px;font-size:calc(16px * var(--ts));font-weight:600;margin-top:4px;"
          as_="transform:scale(.99);">{isSignup?'Create account':'Sign in'}</El>
      </div>
      <p style={{textAlign:'center',fontSize:'calc(13px * var(--ts))',color:'var(--ink-soft)',margin:'20px 0 0',lineHeight:1.5}}>
        {isSignup?'Your data stays on this device until you choose to sync it.':'Forgot your password? Everything here is local, so just make a new account.'}
      </p>
    </section>
  );
}

          Home
        </button>

        {/* Tools group (collapsible) */}
        <button onClick={()=>setToolsOpen(o=>!o)} aria-expanded={toolsOpen}
          style={{display:'flex',alignItems:'center',gap:'11px',width:'100%',textAlign:'left',border:'none',borderRadius:'11px',padding:'10px 12px',fontSize:'calc(14px * var(--ts))',fontWeight:onTool?600:500,cursor:'pointer',background:(onTool&&!toolsOpen)?'color-mix(in srgb,var(--accent) 12%,var(--surface))':'transparent',color:onTool?'var(--ink)':'var(--ink-soft)',transition:'background 160ms,color 160ms',marginTop:'2px'}}>
          <span style={{flex:'none',width:'18px',display:'flex',justifyContent:'center'}} aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          </span>
          <span style={{flex:1}}>Tools</span>
          <span style={{flex:'none',fontSize:'10px',opacity:.55,transform:toolsOpen?'rotate(90deg)':'rotate(0deg)',transition:'transform 240ms cubic-bezier(.22,.61,.36,1)'}} aria-hidden="true">▶</span>
        </button>
        {toolsOpen&&(
          <div className="expand-in" style={{marginLeft:'21px',paddingLeft:'10px',borderLeft:'1.5px solid var(--line)',marginTop:'2px',marginBottom:'4px'}}>
            {TOOLS.map(t=>{const active=view===t.id;return(
              <button key={t.id} onClick={()=>nav(t.id)}
                style={{display:'flex',alignItems:'center',gap:'10px',width:'100%',textAlign:'left',border:'none',borderRadius:'10px',padding:'9px 11px',fontSize:'calc(13.5px * var(--ts))',fontWeight:active?600:500,cursor:'pointer',background:active?`color-mix(in srgb,${t.hue} 18%,var(--surface))`:'transparent',color:active?'var(--ink)':'var(--ink-soft)',transition:'background 160ms,color 160ms',marginBottom:'1px'}}>
                <span style={{flex:'none',width:'8px',height:'8px',borderRadius:'50%',background:t.hue,opacity:active?1:.45}}></span>
                {t.name}
              </button>
            );})}
          </div>
        )}

        <div style={{height:'1px',background:'var(--line)',margin:'12px 8px'}}></div>
        {extras.map(t=>(
          <button key={t.id} onClick={()=>nav(t.id)}
            style={{display:'flex',alignItems:'center',gap:'11px',width:'100%',textAlign:'left',border:'none',borderRadius:'11px',padding:'10px 12px',fontSize:'calc(14px * var(--ts))',fontWeight:view===t.id?600:500,cursor:'pointer',background:view===t.id?'color-mix(in srgb,var(--accent) 12%,var(--surface))':'transparent',color:view===t.id?'var(--ink)':'var(--ink-soft)',transition:'background 160ms',marginBottom:'2px'}}>
            <span style={{flex:'none',width:'18px',textAlign:'center',fontSize:'14px'}}>{t.glyph}</span>{t.name}
          </button>
        ))}
      </div>

      {/* account footer */}
      <div style={{padding:'12px 10px',borderTop:'1px solid var(--line)'}}>
        {account?(
          <button onClick={()=>{go('account');if(onClose)onClose();}}
            style={{display:'flex',alignItems:'center',gap:'10px',width:'100%',textAlign:'left',border:'none',borderRadius:'11px',padding:'10px 12px',background:view==='account'?'color-mix(in srgb,var(--accent) 14%,var(--surface))':'transparent',cursor:'pointer'}}>
            <span style={{width:'28px',height:'28px',borderRadius:'50%',background:'var(--accent)',color:'var(--on-accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,flex:'none'}}>
              {(account.name||account.email||'?').trim().charAt(0).toUpperCase()}
            </span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:'calc(14px * var(--ts))',fontWeight:600,color:'var(--ink)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{(account.name||'').split(' ')[0]}</div>
              <div style={{fontSize:'calc(12px * var(--ts))',color:'var(--ink-soft)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{account.email}</div>
            </div>
          </button>
        ):(
          <button onClick={()=>{go('account');if(onClose)onClose();}}
            style={{display:'flex',alignItems:'center',gap:'10px',width:'100%',textAlign:'left',border:'none',borderRadius:'11px',padding:'10px 12px',background:view==='account'?'color-mix(in srgb,var(--accent) 14%,var(--surface))':'transparent',cursor:'pointer',color:'var(--ink-soft)',fontSize:'calc(14px * var(--ts))',fontWeight:500}}>
            <span style={{width:'28px',height:'28px',borderRadius:'50%',background:'var(--surface-2)',border:'1px solid var(--line)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',flex:'none'}}>→</span>
            Log in / Sign up
          </button>
        )}
      </div>
    </div>
  );

  if(isDrawer) return inner;
  return (
    <aside className="app-aside" style={{position:'sticky',top:'59px',flex:'none',width:'234px',height:'calc(100vh - 59px)',borderRight:'1px solid var(--line)',background:'color-mix(in srgb,var(--surface) 50%,var(--bg))'}}>
      {inner}
    </aside>
  );
}

/* ── Nav icons (inline SVG, inherit color) ────────────────────── */
const NavIcon = {
  home:(<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg>),
  tools:(<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.6"/></svg>),
  account:(<svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M5 20c0-3.7 3.1-5.7 7-5.7s7 2 7 5.7"/></svg>),
};

/* ── Mobile bottom nav (top-level destinations only) ──────────── */
function MobileNav({view, go, openTools, sheetOpen}) {
  const onTool = TOOLS.some(t=>t.id===view);
  const items = [
    {id:'home',    label:'Home',    icon:NavIcon.home,    active:view==='home'&&!sheetOpen,    onClick:()=>go('home')},
    {id:'tools',   label:'Tools',   icon:NavIcon.tools,   active:onTool||sheetOpen,             onClick:openTools},
    {id:'account', label:'Account', icon:NavIcon.account, active:view==='account'&&!sheetOpen,  onClick:()=>go('account')},
  ];
  return (
    <nav className="mobile-nav" style={{position:'fixed',bottom:0,left:0,right:0,zIndex:40,background:'color-mix(in srgb,var(--bg) 92%,transparent)',backdropFilter:'blur(14px)',borderTop:'1px solid var(--line)',padding:'7px 0 max(7px,env(safe-area-inset-bottom))',justifyContent:'space-around',alignItems:'center'}}>
      {items.map(item=>(
        <button key={item.id} onClick={item.onClick} aria-label={item.label}
          style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',background:'none',border:'none',padding:'5px 0',cursor:'pointer',color:item.active?'var(--accent)':'var(--ink-soft)',transition:'color 180ms'}}>
          <span style={{display:'flex',transform:item.active?'translateY(-1px)':'none',transition:'transform 180ms'}} aria-hidden="true">{item.icon}</span>
          <span style={{fontSize:'10.5px',fontWeight:item.active?700:500,letterSpacing:'0.02em'}}>{item.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ── Tools quick-launch sheet (mobile) ────────────────────────── */
function ToolsSheet({open, onClose, go}) {
  if(!open) return null;
  return (
    <div style={{position:'fixed',inset:0,zIndex:60}}>
      <div onClick={onClose} className="fade-in" style={{position:'absolute',inset:0,background:'rgba(0,0,0,.42)',backdropFilter:'blur(2px)'}}></div>
      <div className="sheet-up" role="dialog" aria-label="Tools" style={{position:'absolute',left:0,right:0,bottom:0,background:'var(--bg)',borderTopLeftRadius:'22px',borderTopRightRadius:'22px',borderTop:'1px solid var(--line)',boxShadow:'0 -10px 40px rgba(0,0,0,.22)',padding:'10px 16px calc(20px + env(safe-area-inset-bottom))',maxHeight:'82vh',overflowY:'auto'}}>
        <div style={{width:'40px',height:'4px',borderRadius:'999px',background:'var(--line)',margin:'4px auto 14px'}}></div>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
          <h3 style={{fontFamily:"'Lexend',sans-serif",fontWeight:600,fontSize:'calc(19px * var(--ts))',margin:0,letterSpacing:'-0.01em'}}>All your tools</h3>
          <button onClick={onClose} aria-label="Close" style={{background:'var(--surface)',border:'1px solid var(--line)',borderRadius:'999px',width:'32px',height:'32px',fontSize:'18px',color:'var(--ink-soft)',cursor:'pointer',lineHeight:1}}>×</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {TOOLS.map(t=>(
            <button key={t.id} onClick={()=>{go(t.id);onClose();}}
              style={{display:'flex',alignItems:'center',gap:'14px',width:'100%',textAlign:'left',background:'var(--surface)',border:'1px solid var(--line)',borderRadius:'14px',padding:'13px 15px',cursor:'pointer'}}>
              <span style={{flex:'none',width:'42px',height:'42px',borderRadius:'13px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'19px',background:`linear-gradient(140deg,color-mix(in srgb,${t.hue} 26%,#fff),color-mix(in srgb,${t.hue} 11%,#fff))`,color:t.hueText,boxShadow:`0 5px 14px color-mix(in srgb,${t.hue} 18%,transparent)`}}>{t.glyph}</span>
              <span style={{flex:1,minWidth:0}}>
                <span style={{display:'block',fontSize:'calc(15px * var(--ts))',fontWeight:600,color:'var(--ink)'}}>{t.name}</span>
                <span style={{display:'block',fontSize:'calc(12.5px * var(--ts))',color:'var(--ink-soft)',lineHeight:1.4}}>{t.desc}</span>
              </span>
              <span style={{flex:'none',color:t.hueText,fontWeight:700,fontSize:'17px'}}>→</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════ */
/*  APP                                                            */
/* ══════════════════════════════════════════════════════════════ */
function App() {
  const saved = load();
  const [state, setRaw] = useState({
    view:'welcome',theme:saved.theme||'calm',textSize:saved.textSize||'standard',motion:saved.motion||'calm',
    account:saved.account||null,newsletter:saved.newsletter||null,
    nlEmail:'',nlError:'',authName:'',authEmail:'',authPass:'',authMode:'signup',authError:'',authNews:true,
    ccThing:'',ccF:{recovery:'med',sensory:'med',logistics:'low',masking:'med',decision:'med'},ccBen:'them',ccResult:null,ccHistory:saved.ccHistory||[],
    srLen:(['s30','m1','m5'].includes(saved.srLen)?saved.srLen:'s30'),srRemaining:0,srRunning:false,srDone:{},breathPhase:'idle',
    scrCat:'declines',scrFav:saved.scrFav||[],scrCopied:null,
    ledger:saved.ledger||[],ledLabel:'',ledCat:'work',ledLoad:'medium',
    recEvent:'',recTaxed:[],recPlan:null,recDone:{},recSaved:saved.recSaved||[],recJustSaved:false,
    parking:saved.parking||[],parkInput:'',
  });
  const setState = useCallback(u=>setRaw(p=>{const n=typeof u==='function'?u(p):{...p,...u};persist(n);return n;}),[]);

  const [drawerOpen, setDrawerOpen] = useState(false);
  const [sheetOpen, setSheetOpen] = useState(false);
  const [toolsOpen, setToolsOpen] = useState(true);
  const rootRef = useRef(null);
  const timerRef = useRef({sr:null,breathT:null});

  /* apply CSS custom properties */
  useEffect(()=>{
    const el=rootRef.current; if(!el) return;
    Object.entries(THEME).forEach(([k,v])=>el.style.setProperty('--'+k,v));
    el.style.setProperty('--ts',state.textSize==='large'?'1.16':'1');
    el.style.setProperty('--radius','18px');
    el.style.setProperty('--brand',BRAND_GRAD);
    const toolHue=TOOL_HUES[state.view];
    if(toolHue){
      el.style.setProperty('--accent',TOOL_HUES_TEXT[state.view]);
      el.style.setProperty('--accent-bright',toolHue);
      el.style.setProperty('--accent-soft',`color-mix(in srgb,${toolHue} 14%,#ffffff)`);
      el.style.setProperty('--on-accent','#ffffff');
    } else {
      el.style.setProperty('--accent-bright','#4f9d7b');
    }
  });

  useEffect(()=>()=>{if(timerRef.current.sr)clearInterval(timerRef.current.sr);if(timerRef.current.breathT)clearTimeout(timerRef.current.breathT);},[]);

  const go = view=>{
    if(timerRef.current.sr&&view!=='sensory'){clearInterval(timerRef.current.sr);timerRef.current.sr=null;}
    setState(s=>({...s,view,srRunning:view!=='sensory'?false:s.srRunning}));
    window.scrollTo(0,0);
    setDrawerOpen(false);
    setSheetOpen(false);
    if(TOOLS.some(t=>t.id===view)) setToolsOpen(true);
  };

  const {view,textSize,motion,account} = state;
  const showChrome = view!=='welcome';
  const still = motion==='still';

  return (
    <div ref={rootRef} className={still?'motion-off':''} style={{minHeight:'100vh',backgroundColor:'var(--bg)',backgroundImage:'radial-gradient(color-mix(in srgb,var(--ink) 5%,transparent) 1px,transparent 1.4px)',backgroundSize:'24px 24px',color:'var(--ink)',fontFamily:"'Lexend',system-ui,sans-serif",lineHeight:1.5}}>

      {/* ── HEADER ─────────────────────────────────────────────── */}
      {showChrome&&(
        <header style={{position:'sticky',top:0,zIndex:30,display:'flex',alignItems:'center',gap:'12px',padding:'0 clamp(12px,3vw,28px)',height:'58px',background:'color-mix(in srgb,var(--bg) 88%,transparent)',backdropFilter:'blur(12px)',borderBottom:'1px solid var(--line)'}}>
          {/* hamburger (mobile) */}
          <button className="show-mobile" onClick={()=>setDrawerOpen(true)}
            style={{background:'none',border:'none',color:'var(--ink)',fontSize:'22px',padding:'4px 6px',cursor:'pointer',lineHeight:1,display:'none'}}>☰</button>

          {/* logo */}
          <button onClick={()=>go('home')} style={{display:'flex',alignItems:'center',gap:'9px',background:'none',border:'none',padding:0,color:'var(--ink)',cursor:'pointer',flex:'none'}}>
            <span style={{width:'32px',height:'32px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#4f88cf,#4f9d7b 52%,#9572c4)',color:'#fff',fontWeight:700,fontSize:'16px',boxShadow:'0 3px 10px color-mix(in srgb,var(--accent) 30%,transparent)'}}>∞</span>
            <span style={{fontWeight:700,fontSize:'calc(16px * var(--ts))',whiteSpace:'nowrap',letterSpacing:'-0.02em'}}>AuTools</span>
          </button>

          <div style={{flex:1}}></div>

          {/* controls */}
          <div className="hide-mobile" style={{display:'flex',alignItems:'center',gap:'10px'}}>
            {/* text size */}
            <div style={{display:'flex',border:'1px solid var(--line)',borderRadius:'999px',overflow:'hidden',background:'var(--surface)'}}>
              {[{id:'standard',label:'A'},{id:'large',label:'A+'}].map(o=>(
                <button key={o.id} onClick={()=>setState(s=>({...s,textSize:o.id}))}
                  style={{border:'none',padding:'6px 11px',fontSize:o.id==='large'?'14px':'12px',fontWeight:600,background:textSize===o.id?'var(--accent)':'transparent',color:textSize===o.id?'var(--on-accent)':'var(--ink-soft)',cursor:'pointer'}}>{o.label}</button>
              ))}
            </div>
            <button onClick={()=>setState(s=>({...s,motion:s.motion==='still'?'calm':'still'}))}
              style={{background:still?'var(--surface)':'var(--accent-soft)',border:'1px solid var(--line)',color:'var(--ink-soft)',borderRadius:'999px',padding:'6px 13px',fontSize:'calc(12px * var(--ts))',fontWeight:500,whiteSpace:'nowrap',cursor:'pointer'}}>{still?'Motion off':'Motion on'}</button>
            <button onClick={()=>go('settings')} style={{background:'none',border:'none',color:'var(--ink-soft)',fontSize:'calc(13px * var(--ts))',fontWeight:500,padding:'6px',cursor:'pointer'}}>Settings</button>
          </div>

          {/* account button (hidden on mobile, where the bottom nav handles it) */}
          {!account?(
            <El tag="button" className="hide-mobile" onClick={()=>go('account')}
              s="white-space:nowrap;background:var(--accent);color:var(--on-accent);border:none;border-radius:999px;padding:8px 18px;font-size:calc(13px * var(--ts));font-weight:600;transition:transform 200ms,opacity 200ms;"
              hs="opacity:.92;" as_="transform:scale(.96);">Log in</El>
          ):(
            <button onClick={()=>go('account')} className="hide-mobile" style={{display:'flex',alignItems:'center',gap:'7px',background:'var(--surface)',border:'1px solid var(--line)',borderRadius:'999px',padding:'4px 12px 4px 4px',cursor:'pointer'}}>
              <span style={{width:'26px',height:'26px',borderRadius:'50%',background:'var(--accent)',color:'var(--on-accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:700}}>
                {(account.name||account.email||'?').trim().charAt(0).toUpperCase()}
              </span>
              <span style={{fontSize:'calc(13px * var(--ts))',fontWeight:600,color:'var(--ink)'}}>{(account.name||'').split(' ')[0]||'Account'}</span>
            </button>
          )}
        </header>
      )}

      {/* ── DRAWER OVERLAY (mobile) ─────────────────────────────── */}
      {drawerOpen&&(
        <>
          <div onClick={()=>setDrawerOpen(false)} className="fade-in"
            style={{position:'fixed',inset:0,zIndex:48,background:'rgba(0,0,0,.4)',backdropFilter:'blur(2px)'}}></div>
          <div className="drawer-open"
            style={{position:'fixed',top:0,left:0,bottom:0,zIndex:49,width:'280px',background:'var(--bg)',borderRight:'1px solid var(--line)',boxShadow:'4px 0 32px rgba(0,0,0,.18)'}}>
            <Sidebar view={view} go={go} account={account} onClose={()=>setDrawerOpen(false)} isDrawer={true} toolsOpen={toolsOpen} setToolsOpen={setToolsOpen}/>
          </div>
        </>
      )}

      {/* ── BODY ────────────────────────────────────────────────── */}
      <div style={{display:'flex',alignItems:'flex-start'}}>
        {showChrome&&<Sidebar view={view} go={go} account={account} onClose={null} isDrawer={false} toolsOpen={toolsOpen} setToolsOpen={setToolsOpen}/>}
        <main style={{flex:1,minWidth:0,paddingBottom:showChrome?'60px':'0'}}>
          <div key={view} className="view-enter">
            {view==='welcome'  && <Welcome play={still?'paused':'running'} go={go}/>}
            {view==='home'     && <Home goTool={go}/>}
            {view==='capacity' && <Capacity state={state} setState={setState} goHome={()=>go('home')}/>}
            {view==='sensory'  && <Sensory state={state} setState={setState} timerRef={timerRef.current} goHome={()=>go('home')}/>}
            {view==='scripts'  && <Scripts state={state} setState={setState} goHome={()=>go('home')}/>}
            {view==='ledger'   && <Ledger state={state} setState={setState} goHome={()=>go('home')}/>}
            {view==='recovery' && <Recovery state={state} setState={setState} goHome={()=>go('home')}/>}
            {view==='parking'  && <Parking state={state} setState={setState} goHome={()=>go('home')}/>}
            {view==='about'    && <About state={state} setState={setState} goHome={()=>go('home')}/>}
            {view==='account'  && <Account state={state} setState={setState} goHome={()=>go('home')} goTool={go}/>}
            {view==='privacy'  && <Privacy goHome={()=>go('home')}/>}
            {view==='settings' && <Settings state={state} setState={setState} goHome={()=>go('home')}/>}
          </div>
        </main>
      </div>

      {/* ── TOOLS SHEET (mobile) ────────────────────────────────── */}
      <ToolsSheet open={sheetOpen} onClose={()=>setSheetOpen(false)} go={go}/>

      {/* ── FOOTER ──────────────────────────────────────────────── */}
      {showChrome&&(
        <footer style={{borderTop:'1px solid var(--line)',padding:'20px clamp(16px,4vw,40px)',textAlign:'center',paddingBottom:'calc(20px + env(safe-area-inset-bottom))'}}>
          <p style={{fontSize:'calc(12px * var(--ts))',color:'var(--ink-soft)',margin:'0 0 8px'}}>Self-advocacy tools, not medical advice. Saved only on this device.</p>
          <div style={{display:'flex',gap:'16px',justifyContent:'center',flexWrap:'wrap',marginBottom:'8px'}}>
            {[['About','about'],['Privacy','privacy'],['Settings','settings']].map(([l,v])=>(
              <button key={v} onClick={()=>go(v)} style={{background:'none',border:'none',color:'var(--ink-soft)',fontSize:'calc(12px * var(--ts))',fontWeight:500,padding:0,textDecoration:'underline',textUnderlineOffset:'3px',cursor:'pointer'}}>{l}</button>
            ))}
          </div>
          <p style={{fontSize:'calc(12px * var(--ts))',color:'var(--ink-soft)',margin:0}}>© {new Date().getFullYear()} AuTools. All rights reserved.</p>
        </footer>
      )}

      {/* ── MOBILE BOTTOM NAV ───────────────────────────────────── */}
      {showChrome&&<MobileNav view={view} go={go} openTools={()=>setSheetOpen(true)} sheetOpen={sheetOpen}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
